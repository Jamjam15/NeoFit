<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoFit</title>

    <link rel="stylesheet" href="style.css">
    
</head>
<body>

    <div class="navbar">
        <h1>NEOFit</h1>

        <div class="options">
            <h4>Trending</h4>
            <h4>Men</h4>
            <h4>Women</h4>
            <h4>Kids</h4>
            <h4>Sale</h4>
        </div>

        <form action="">
            <img src="/Icons/search.png" alt="">
            <input type="text" placeholder="Search">
        </form>

        <div class="icons">
            <img src="/Icons/Vector.png" alt="" class="profile">

            <img src="/Icons/cart-fill.png" alt="" class="cart">
        </div>
    </div>

    <div class="container">
        <img src="./Icons/outfit.png" alt="" class="hero-image">

        <div class="login-form">
            <h1>NeoFit Account</h1>

            <div class="choice">
                <h3>Login</h3>
                <h3>Sign Up</h3>
            </div>
            <p>Welcome back! Log in using your email and password.</p>
            <form action="">
                <input type="text" placeholder="Email">
                <input type="password" placeholder="Password">
            </form>
            <button>Forgot Password?</button>
            <p>By signing up, I accept NeoFit's Privacy Policy and Legal Statement.</p>
            <button>Login</button>
            <div class="footer">
                <span>Contact US</span>
                <span>Find a Store</span>
                <span>About NeoFit</span>
            </div>
        </div>
    </div>

    

    
</body>
</html>
